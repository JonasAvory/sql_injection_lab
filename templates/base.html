<!DOCTYPE html>
<!-- Note: this file is mainly AI-generated. -->
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SQL Injection Lab{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
    <style>
        /* Widen the outer container on large screens so the two-column
           level layout has more room. Bootstrap's default container-xxl
           caps at 1320px; this roughly halves the leftover side margins. */
        @media (min-width: 992px) {
            .container-xxl {
                max-width: 100% !important;
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
        }

        /* Panels that expose "behind the scenes" information a real user
           would never see (the executed SQL, the Python route source).
           The tan background is a visual cue that this is a dev/inspector
           view, not part of the normal page. */
        .dev-panel {
            background-color: #f5ead3;
            border: 1px solid #c9a86a;
        }
        .dev-panel > summary {
            background-color: #e8d7ac;
            color: #4a3a1a;
            border-bottom: 1px solid #c9a86a;
        }
        .dev-panel[open] > summary {
            border-bottom: 1px solid #c9a86a;
        }
        /* Wrap long executed-query text so it grows downward and stays fully
           visible instead of overflowing horizontally. */
        .dev-panel pre.wrap {
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-xxl">
            <a class="navbar-brand" href="/">SQL Injection Lab</a>
        </div>
    </nav>

    <main class="container-xxl py-4">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Auto-growing text fields: any <textarea class="autogrow"> expands
        // downward as you type so long injection payloads stay fully visible.
        // Enter still submits the form (Shift+Enter inserts a newline).
        function autogrow(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('textarea.autogrow').forEach(function (el) {
                autogrow(el);
                el.addEventListener('input', function () { autogrow(el); });
                el.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        el.form.requestSubmit();
                    }
                });
            });
        });
    </script>
</body>
</html>
